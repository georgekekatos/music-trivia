<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia Master SRS</title>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div id="auth-section" class="text-center">
        <h1 class="text-4xl font-bold mb-8 text-green-500">Trivia SRS</h1>
        <button id="login-btn" class="bg-green-600 hover:bg-green-500 px-8 py-4 rounded-full font-bold text-xl transition-all">
            Login to Spotify
        </button>
    </div>

    <div id="player-section" class="hidden w-full max-w-md text-center">
        <div class="mb-4">
            <select id="year-filter" class="bg-gray-800 text-white p-3 rounded-lg w-full border border-gray-700">
                <option value="ALL">All Years (Due for Review)</option>
            </select>
        </div>

        <div id="audio-visual" class="h-48 flex flex-col items-center justify-center mb-8 border-2 border-dashed border-gray-700 rounded-xl">
            <div id="playing-status" class="text-gray-400 font-medium">Ready to Play</div>
            <div id="visualizer" class="visualizer hidden">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </div>

        <div id="status-container" class="mb-6">
            <span class="stat-new" id="count-new">0</span> + 
            <span class="stat-learning" id="count-learning">0</span> + 
            <span class="stat-due" id="count-due">0</span>
        </div>

        <div id="reveal-area" class="hidden mb-8 animate-fade-in">
            <h2 id="song-title" class="text-2xl font-bold text-green-400"></h2>
            <p id="song-artist" class="text-xl text-gray-300 mb-2"></p>
            <p id="song-year" class="text-sm text-gray-500 uppercase tracking-widest"></p>
        </div>

        <div class="flex flex-col gap-4">
            <button id="main-action-btn" class="bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl text-2xl font-bold shadow-lg transition-all">
                PLAY
            </button>
            
            <div id="srs-controls" class="hidden grid grid-cols-4 gap-2">
                <button data-grade="1" class="bg-red-700 hover:bg-red-600 p-4 rounded-lg text-xs font-bold btn-srs">AGAIN</button>
                <button data-grade="2" class="bg-orange-600 hover:bg-orange-500 p-4 rounded-lg text-xs font-bold btn-srs">HARD</button>
                <button data-grade="3" class="bg-blue-700 hover:bg-blue-600 p-4 rounded-lg text-xs font-bold btn-srs">GOOD</button>
                <button data-grade="4" class="bg-green-700 hover:bg-green-600 p-4 rounded-lg text-xs font-bold btn-srs">EASY</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
